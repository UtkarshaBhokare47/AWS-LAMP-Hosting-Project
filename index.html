<!DOCTYPE html>
<html>
<head>
    <title>AWS LAMP Hosting Project</title>
    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#0f172a,#1e3a8a);
            color:white;
            text-align:center;
        }

        .container{
            margin-top:120px;
        }

        h1{
            font-size:55px;
            margin-bottom:10px;
        }

        h2{
            color:#facc15;
        }

        .card{
            width:60%;
            margin:auto;
            padding:30px;
            background:rgba(255,255,255,0.1);
            border-radius:20px;
            backdrop-filter:blur(10px);
            box-shadow:0 0 20px rgba(255,255,255,0.2);
        }

        .badge{
            display:inline-block;
            padding:10px 20px;
            background:#22c55e;
            border-radius:30px;
            margin-top:20px;
            font-weight:bold;
        }

        footer{
            margin-top:50px;
            color:#d1d5db;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">

        <h1>☁️ AWS LAMP Hosting</h1>

        <h2>Successfully Deployed on Amazon EC2 🚀</h2>

        <p>
            Linux + Apache + PHP Hosting Project
        </p>

        <div class="badge">
            ✅ Project Status: Running
        </div>

        <h3>Services Used</h3>

        <p>
            Amazon EC2 | Apache HTTP Server | PHP 8.5
        </p>

        <footer>
            Created by Utkarsha Bhokare
        </footer>

    </div>
</div>

</body>
</html>
